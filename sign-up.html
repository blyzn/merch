<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="assets/logo.png" />

    <title>Merch Store</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- Firebase (Authentication + Firestore) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="script/firebase-config.js"></script>
  </head>
  <body>
    <style>
      @font-face {
        font-family: "SF Pro Display";
        src: url("fonts/SF-Pro-Display-Bold.otf") format("opentype");
      }

      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-font: "SF Pro Display";
      }

      h1,
      p {
        font-family: var(--primary-font);
      }

      .form {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        font-family: var(--primary-font);
      }

      button {
        width: 100%;
        padding: 1rem 1rem 1rem 3rem;
        display: flex;
        align-items: center; /* Vertically center image and text */
        position: relative;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid #dcdcdc;
        color: #444;
        gap: 0; /* No gap — control it manually */
      }

      button img {
        position: absolute; /* Place it at the far left */
        left: 0.5rem; /* Match the left padding of the button */
        width: 20px;
        height: 20px;
      }

      button span {
        flex: 1; /* Take up remaining space */
        text-align: left; /* Center text horizontally */
        font-size: 16px;
        font-family: var(--primary-font);
      }

      .google-button,
      .sign-up-we {
        background-color: transparent;
      }

      .google-button img {
        width: 30px;
        height: 30px;
      }

      .sign-up-we {
        border: 1px solid transparent;
        transition: border 0.3s ease;
      }

      .sign-up-we:hover {
        border: 1px solid black;
      }

      .email-form {
        display: none;
        flex-direction: column;
        width: 25%;
        min-width: 260px;
        gap: 0.75rem;
        margin-top: 0.5rem;
      }

      .email-form.active {
        display: flex;
      }

      .email-form input {
        padding: 0.85rem 1rem;
        font-size: 14px;
        font-family: inherit;
        border: 1px solid #dcdcdc;
        border-radius: 2px;
      }

      .email-form input:focus {
        outline: none;
        border: 1px solid black;
      }

      .email-form .primary-btn {
        width: 100%;
        padding: 1rem 1.5rem 1rem 1.5rem;
        justify-content: center;
        background-color: #111;
        color: #fff;
        border: 1px solid #111;
      }

      .email-form .primary-btn:hover {
        opacity: 0.85;
      }

      .form-message {
        font-size: 13px;
        font-family: var(--primary-font);
        min-height: 1em;
        margin: 0.25rem 0 0;
      }

      .form-message.error {
        color: #c0392b;
      }

      .form-message.success {
        color: #1e7e34;
      }

      .back-link {
        font-size: 13px;
        text-align: center;
        cursor: pointer;
        text-decoration: underline;
        margin-top: 0.25rem;
      }

      .initial-options.hidden {
        display: none;
      }

      a {
        cursor: pointer;
      }
    </style>
    <div class="form">
      <h1 id="formTitle">Sign Up</h1>
      <p id="modeToggleText">
        Already a member? <a id="modeToggleLink">Log In</a>
      </p>

      <div class="initial-options" id="initialOptions">
        <button class="google-button" id="googleBtn">
          <img class="google" src="assets/google.webp" />
          <span id="googleBtnText">Sign up with Google</span>
        </button>

        <span class="or">or</span>

        <button class="sign-up-we" id="emailToggleBtn">
          <span id="emailToggleBtnText">Sign up with email</span>
        </button>
      </div>

      <form class="email-form" id="emailForm">
        <input
          type="text"
          id="firstNameField"
          placeholder="First name"
          autocomplete="given-name"
        />
        <input
          type="email"
          id="emailField"
          placeholder="Email"
          autocomplete="email"
          required
        />
        <input
          type="password"
          id="passwordField"
          placeholder="Password"
          autocomplete="new-password"
          minlength="6"
          required
        />
        <input
          type="password"
          id="confirmField"
          placeholder="Confirm password"
          autocomplete="new-password"
        />
        <p class="form-message" id="formMessage"></p>
        <button type="submit" class="primary-btn" id="submitBtn">
          Sign up
        </button>
        <span class="back-link" id="backLink">Back</span>
      </form>
    </div>

    <script>
      const initialOptions = document.getElementById("initialOptions");
      const emailForm = document.getElementById("emailForm");
      const emailToggleBtn = document.getElementById("emailToggleBtn");
      const backLink = document.getElementById("backLink");
      const formTitle = document.getElementById("formTitle");
      const modeToggleText = document.getElementById("modeToggleText");
      const modeToggleLink = document.getElementById("modeToggleLink");
      const firstNameField = document.getElementById("firstNameField");
      const emailField = document.getElementById("emailField");
      const passwordField = document.getElementById("passwordField");
      const confirmField = document.getElementById("confirmField");
      const formMessage = document.getElementById("formMessage");
      const submitBtn = document.getElementById("submitBtn");
      const googleBtn = document.getElementById("googleBtn");

      // This demo site has no backend, so "accounts" are simulated with
      // localStorage. Passwords are NOT encrypted or hashed here — this is
      // fine for a front-end demo, but should never be done in a real app.
      let mode = "signup"; // or "login"

      function setMessage(text, type) {
        formMessage.textContent = text;
        formMessage.className = "form-message" + (type ? " " + type : "");
      }

      function showEmailForm() {
        initialOptions.classList.add("hidden");
        emailForm.classList.add("active");
      }

      function showInitialOptions() {
        initialOptions.classList.remove("hidden");
        emailForm.classList.remove("active");
        setMessage("", "");
      }

      function setMode(newMode) {
        mode = newMode;
        setMessage("", "");
        if (mode === "signup") {
          formTitle.textContent = "Sign Up";
          submitBtn.textContent = "Sign up";
          modeToggleText.innerHTML =
            'Already a member? <a id="modeToggleLink">Log In</a>';
          firstNameField.style.display = "block";
          confirmField.style.display = "block";
          document.getElementById("googleBtnText").textContent =
            "Sign up with Google";
          document.getElementById("emailToggleBtnText").textContent =
            "Sign up with email";
        } else {
          formTitle.textContent = "Log In";
          submitBtn.textContent = "Log in";
          modeToggleText.innerHTML =
            'New here? <a id="modeToggleLink">Sign Up</a>';
          firstNameField.style.display = "none";
          confirmField.style.display = "none";
          document.getElementById("googleBtnText").textContent =
            "Log in with Google";
          document.getElementById("emailToggleBtnText").textContent =
            "Log in with email";
        }
        // Re-bind the link since innerHTML replaced it
        document
          .getElementById("modeToggleLink")
          .addEventListener("click", () =>
            setMode(mode === "signup" ? "login" : "signup"),
          );
      }

      emailToggleBtn.addEventListener("click", showEmailForm);
      backLink.addEventListener("click", showInitialOptions);

      document
        .getElementById("modeToggleLink")
        .addEventListener("click", () => setMode("login"));

      // Google sign-in via Firebase — Firebase handles the whole
      // popup/token exchange, we just get a signed-in user back.
      const googleProvider = new firebase.auth.GoogleAuthProvider();

      function completeSocialLogin(result) {
        const user = result.user;
        // merge: true so this never overwrites profile fields (address,
        // phone, etc.) the person may have already filled in before —
        // it only fills in name/email if they're missing.
        return db
          .collection("users")
          .doc(user.uid)
          .set(
            {
              firstName: user.displayName ? user.displayName.split(" ")[0] : "",
              email: user.email || "",
            },
            { merge: true },
          )
          .then(() => {
            setMessage("Signed in! Redirecting…", "success");
            setTimeout(() => {
              window.location.href = "user.html";
            }, 600);
          });
      }

      googleBtn.addEventListener("click", () => {
        auth
          .signInWithPopup(googleProvider)
          .then(completeSocialLogin)
          .catch((err) => setMessage(friendlyFirebaseError(err), "error"));
      });

      emailForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const first = firstNameField.value.trim();
        const email = emailField.value.trim().toLowerCase();
        const password = passwordField.value;
        const confirm = confirmField.value;

        if (!email || !password) {
          setMessage("Please fill in email and password.", "error");
          return;
        }

        if (mode === "signup") {
          if (password.length < 6) {
            setMessage("Password must be at least 6 characters.", "error");
            return;
          }
          if (password !== confirm) {
            setMessage("Passwords don't match.", "error");
            return;
          }

          submitBtn.disabled = true;
          auth
            .createUserWithEmailAndPassword(email, password)
            .then((credential) => {
              // Save the extra profile fields Firebase Auth itself doesn't
              // store, in this user's own Firestore document.
              return db.collection("users").doc(credential.user.uid).set({
                firstName: first,
                middleName: "",
                lastName: "",
                address: "",
                email: email,
                phone: "",
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              });
            })
            .then(() => {
              setMessage("Account created! Redirecting…", "success");
              setTimeout(() => {
                window.location.href = "user.html";
              }, 700);
            })
            .catch((err) => {
              setMessage(friendlyFirebaseError(err), "error");
            })
            .finally(() => {
              submitBtn.disabled = false;
            });
        } else {
          submitBtn.disabled = true;
          auth
            .signInWithEmailAndPassword(email, password)
            .then(() => {
              setMessage("Welcome back! Redirecting…", "success");
              setTimeout(() => {
                window.location.href = "user.html";
              }, 700);
            })
            .catch((err) => {
              setMessage(friendlyFirebaseError(err), "error");
            })
            .finally(() => {
              submitBtn.disabled = false;
            });
        }
      });
    </script>
  </body>
</html>
